<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Workhorse Station</title>
    <script>
      (() => {
        try {
          const storedTheme = window.localStorage.getItem("workhorse:ui-theme");
          const storedTerminalThemeMode = window.localStorage.getItem("workhorse:terminal-theme");
          const theme = storedTheme === "light" || storedTheme === "dark"
            ? storedTheme
            : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          const terminalThemeMode = storedTerminalThemeMode === "follow" || storedTerminalThemeMode === "light" || storedTerminalThemeMode === "dark"
            ? storedTerminalThemeMode
            : "follow";
          const terminalTheme = terminalThemeMode === "follow" ? theme : terminalThemeMode;
          const root = document.documentElement;
          root.dataset.uiTheme = theme;
          root.dataset.terminalTheme = terminalTheme;
          root.style.colorScheme = theme;
          root.classList.toggle("dark", theme === "dark");
          root.classList.toggle("light", theme === "light");
        } catch {
          // ignore theme bootstrap failures
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
